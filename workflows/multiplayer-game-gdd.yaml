name: Multiplayer Game GDD Workflow
description: Specialized workflow for creating GDDs for multiplayer games including competitive, cooperative, and social experiences
icon: 👥
category: genre-specific
version: "1.0"

workflow:
  # 工作流程概述
  overview:
    purpose: "Create a comprehensive GDD specifically optimized for multiplayer game development"
    target_output: "Multiplayer game GDD with robust social systems and balanced competitive play"
    estimated_duration: "5-8 weeks depending on complexity"
    team_size: "10-14 specialists with multiplayer expertise"
    
  # 多人游戏特殊考虑
  multiplayer_considerations:
    core_principles:
      - "Fair and balanced competitive play"
      - "Meaningful social interaction and cooperation"
      - "Robust anti-cheat and security systems"
      - "Scalable server architecture and performance"
      - "Community building and long-term engagement"
    
    player_expectations:
      - "Stable and responsive network performance"
      - "Fair matchmaking and skill-based competition"
      - "Effective communication and social tools"
      - "Regular content updates and meta evolution"
      - "Strong community moderation and support"
    
    design_challenges:
      - "Balancing competitive integrity with accessibility"
      - "Managing toxic behavior and fostering positive community"
      - "Scaling server infrastructure for varying player counts"
      - "Maintaining engagement across diverse skill levels"
      - "Preventing cheating and exploitation"

  # 阶段定义
  phases:
    # 第一阶段：多人游戏市场研究
    - phase: "multiplayer_market_research"
      name: "Multiplayer Game Market Research"
      duration: "1-2 weeks"
      description: "Research multiplayer gaming market and establish competitive positioning"
      
      participants:
        primary:
          - market-analyst
          - multiplayer-specialist
          - game-systems-architect
        supporting:
          - western-game-designer
          - eastern-game-designer
          - liveops-designer
      
      tasks:
        - task: "create-market-analysis"
          owner: "market-analyst"
          duration: "1 week"
          deliverable: "Multiplayer game market analysis"
          
        - task: "design-multiplayer-systems"
          owner: "multiplayer-specialist"
          duration: "1 week"
          deliverable: "Multiplayer positioning strategy"
          
        - task: "brainstorm-game-concept"
          owner: "game-systems-architect"
          duration: "1 week"
          deliverable: "Multiplayer concept framework"
      
      deliverables:
        - "Multiplayer Game Market Analysis"
        - "Competitive Landscape and Positioning"
        - "Target Audience and Player Personas"
        - "Platform Strategy and Distribution"
        - "Community Size and Engagement Projections"
      
      quality_gates:
        - "Multiplayer market opportunity validated"
        - "Competitive differentiation established"
        - "Target community size is realistic"
        - "Platform strategy supports multiplayer needs"

    # 第二阶段：核心多人机制设计
    - phase: "core_multiplayer_mechanics"
      name: "Core Multiplayer Mechanics Design"
      duration: "2-3 weeks"
      description: "Design fundamental multiplayer gameplay systems and mechanics"
      
      participants:
        primary:
          - multiplayer-specialist
          - game-systems-architect
          - mechanics-specialist
          - player-experience-designer
        supporting:
          - technical-designer
          - playtesting-simulator
      
      tasks:
        - task: "design-multiplayer-systems"
          owner: "multiplayer-specialist"
          duration: "2-3 weeks"
          deliverable: "Core multiplayer systems specification"
          
        - task: "design-core-mechanics"
          owner: "mechanics-specialist"
          duration: "2 weeks"
          deliverable: "Multiplayer mechanics implementation"
          
        - task: "workshop-game-mechanics"
          owner: "game-systems-architect"
          duration: "1 week"
          deliverable: "Integrated multiplayer systems"
          
        - task: "outline-game-progression"
          owner: "player-experience-designer"
          duration: "1 week"
          deliverable: "Multiplayer progression framework"
      
      deliverables:
        - "Core Multiplayer Systems Specification"
        - "Player Interaction and Communication Design"
        - "Competitive and Cooperative Mechanics"
        - "Team Formation and Management Systems"
        - "Skill-Based Progression and Ranking"
      
      quality_gates:
        - "Multiplayer mechanics create engaging interactions"
        - "Systems support both competitive and cooperative play"
        - "Player progression is meaningful and balanced"
        - "Communication systems facilitate teamwork"

    # 第三阶段：网络架构与技术设计
    - phase: "network_technical_design"
      name: "Network Architecture & Technical Design"
      duration: "2-3 weeks"
      description: "Design robust network architecture and technical systems for multiplayer"
      
      participants:
        primary:
          - technical-designer
          - multiplayer-specialist
        supporting:
          - game-systems-architect
          - pc-console-specialist
          - mobile-game-specialist
      
      tasks:
        - task: "create-technical-specification"
          owner: "technical-designer"
          duration: "2-3 weeks"
          deliverable: "Multiplayer technical architecture"
          
        - task: "design-multiplayer-systems"
          owner: "multiplayer-specialist"
          duration: "2 weeks"
          deliverable: "Network systems specification"
          
        - task: "design-platform-optimization"
          owner: "pc-console-specialist"
          duration: "1 week"
          deliverable: "Platform-specific networking"
      
      deliverables:
        - "Multiplayer Technical Architecture"
        - "Server Infrastructure and Scalability Plan"
        - "Network Synchronization and Latency Management"
        - "Anti-Cheat and Security Systems"
        - "Cross-Platform Compatibility Framework"
      
      quality_gates:
        - "Network architecture supports target player counts"
        - "Latency and performance requirements are realistic"
        - "Anti-cheat systems are comprehensive"
        - "Cross-platform play is technically feasible"

    # 第四阶段：匹配与平衡系统
    - phase: "matchmaking_balance_systems"
      name: "Matchmaking & Balance Systems"
      duration: "1-2 weeks"
      description: "Design fair matchmaking and game balance systems"
      
      participants:
        primary:
          - multiplayer-specialist
          - mechanics-specialist
          - playtesting-simulator
        supporting:
          - game-systems-architect
          - technical-designer
      
      tasks:
        - task: "design-multiplayer-systems"
          owner: "multiplayer-specialist"
          duration: "1-2 weeks"
          deliverable: "Matchmaking system specification"
          
        - task: "workshop-game-mechanics"
          owner: "mechanics-specialist"
          duration: "1-2 weeks"
          deliverable: "Balance framework and methodology"
          
        - task: "simulate-playtesting"
          owner: "playtesting-simulator"
          duration: "1 week"
          deliverable: "Balance simulation and testing"
      
      deliverables:
        - "Matchmaking System Specification"
        - "Skill Rating and Ranking Systems"
        - "Game Balance Framework and Methodology"
        - "Meta-Game Management and Evolution"
        - "Fair Play and Competitive Integrity"
      
      quality_gates:
        - "Matchmaking creates fair and engaging matches"
        - "Ranking system accurately reflects skill"
        - "Balance framework prevents dominant strategies"
        - "Meta-game evolution is planned and managed"

    # 第五阶段：社区与社交功能
    - phase: "community_social_features"
      name: "Community & Social Features"
      duration: "1-2 weeks"
      description: "Design community building and social interaction systems"
      
      participants:
        primary:
          - multiplayer-specialist
          - liveops-designer
          - ui-ux-designer
        supporting:
          - game-narrative-designer
          - accessibility-specialist
      
      tasks:
        - task: "design-multiplayer-systems"
          owner: "multiplayer-specialist"
          duration: "1-2 weeks"
          deliverable: "Social systems specification"
          
        - task: "create-liveops-strategy"
          owner: "liveops-designer"
          duration: "1 week"
          deliverable: "Community management plan"
          
        - task: "design-ui-ux-systems"
          owner: "ui-ux-designer"
          duration: "1 week"
          deliverable: "Social UI/UX specification"
      
      deliverables:
        - "Social Systems and Community Features"
        - "Guild/Clan and Team Management"
        - "Communication and Moderation Tools"
        - "Community Events and Tournaments"
        - "User-Generated Content and Sharing"
      
      quality_gates:
        - "Social features encourage positive community"
        - "Moderation tools effectively manage toxicity"
        - "Community events drive engagement"
        - "User-generated content enhances experience"

    # 第六阶段：运营与内容策略
    - phase: "operations_content_strategy"
      name: "Live Operations & Content Strategy"
      duration: "1-2 weeks"
      description: "Design live operations and ongoing content strategy for multiplayer"
      
      participants:
        primary:
          - liveops-designer
          - multiplayer-specialist
          - monetization-designer
        supporting:
          - market-analyst
          - game-design-critic
      
      tasks:
        - task: "create-liveops-strategy"
          owner: "liveops-designer"
          duration: "1-2 weeks"
          deliverable: "Multiplayer live operations plan"
          
        - task: "design-monetization-system"
          owner: "monetization-designer"
          duration: "1 week"
          deliverable: "Multiplayer monetization strategy"
          
        - task: "market-viability-assessment"
          owner: "market-analyst"
          duration: "1 week"
          deliverable: "Long-term sustainability analysis"
      
      deliverables:
        - "Live Operations Strategy and Roadmap"
        - "Seasonal Content and Event Planning"
        - "Multiplayer Monetization Strategy"
        - "Esports and Competitive Scene Support"
        - "Community Growth and Retention Plan"
      
      quality_gates:
        - "Live operations plan supports long-term engagement"
        - "Content strategy maintains meta-game health"
        - "Monetization respects competitive integrity"
        - "Esports support enhances community value"

    # 第七阶段：多人游戏质量保证
    - phase: "multiplayer_quality_assurance"
      name: "Multiplayer Game Quality Assurance"
      duration: "1-2 weeks"
      description: "Comprehensive quality review focusing on multiplayer requirements"
      
      participants:
        primary:
          - gdd-reviewer
          - multiplayer-specialist
          - playtesting-simulator
          - game-design-critic
        supporting:
          - technical-designer
          - liveops-designer
      
      tasks:
        - task: "comprehensive-design-review"
          owner: "gdd-reviewer"
          duration: "1 week"
          deliverable: "Multiplayer GDD review report"
          
        - task: "simulate-playtesting"
          owner: "playtesting-simulator"
          duration: "1-2 weeks"
          deliverable: "Multiplayer playtesting results"
          
        - task: "create-game-design-critique"
          owner: "game-design-critic"
          duration: "1 week"
          deliverable: "Multiplayer design critique"
      
      deliverables:
        - "Multiplayer Game GDD Review Report"
        - "Network Performance and Scalability Assessment"
        - "Community and Social Systems Evaluation"
        - "Competitive Balance and Fair Play Analysis"
        - "Launch Strategy and Community Building Plan"
      
      quality_gates:
        - "All multiplayer requirements met"
        - "Network architecture is robust and scalable"
        - "Community systems foster positive interaction"
        - "Competitive integrity is maintained"

  # 多人游戏特殊流程
  multiplayer_specific_processes:
    network_testing:
      - "Latency and performance testing across regions"
      - "Load testing with simulated player counts"
      - "Network failure and recovery testing"
      - "Cross-platform compatibility validation"
    
    balance_methodology:
      - "Data-driven balance analysis and adjustment"
      - "Community feedback integration"
      - "Professional player and esports input"
      - "Continuous meta-game monitoring"
    
    community_management:
      - "Moderation tools and policies"
      - "Community guidelines and enforcement"
      - "Positive behavior reinforcement systems"
      - "Toxicity prevention and intervention"
    
    anti_cheat_security:
      - "Client-side validation and server authority"
      - "Behavioral analysis and anomaly detection"
      - "Regular security audits and updates"
      - "Community reporting and investigation"

  # 多人游戏成功指标
  multiplayer_success_metrics:
    engagement_metrics:
      - "Concurrent player counts and peak times"
      - "Match completion rates and session length"
      - "Player retention and return rates"
      - "Social interaction frequency and depth"
    
    competitive_metrics:
      - "Matchmaking quality and fairness"
      - "Ranking system accuracy and progression"
      - "Meta-game diversity and balance"
      - "Esports participation and viewership"
    
    community_metrics:
      - "Community growth and health indicators"
      - "Positive vs negative behavior ratios"
      - "User-generated content creation"
      - "Community event participation"
    
    technical_metrics:
      - "Network performance and latency"
      - "Server stability and uptime"
      - "Anti-cheat effectiveness"
      - "Cross-platform functionality"

  # 多人游戏风险管理
  multiplayer_risk_management:
    technical_risks:
      - risk: "Network performance and scalability issues"
        mitigation: "Robust architecture and extensive testing"
        
      - risk: "Cheating and exploitation"
        mitigation: "Comprehensive anti-cheat systems"
        
      - risk: "Server downtime and service interruption"
        mitigation: "Redundant infrastructure and monitoring"
    
    community_risks:
      - risk: "Toxic behavior and community fragmentation"
        mitigation: "Strong moderation and positive reinforcement"
        
      - risk: "Declining player base and empty servers"
        mitigation: "Engaging content and community building"
        
      - risk: "Competitive imbalance and meta stagnation"
        mitigation: "Active balance management and updates"
    
    business_risks:
      - risk: "High server and infrastructure costs"
        mitigation: "Efficient architecture and monetization"
        
      - risk: "Regulatory issues with online gaming"
        mitigation: "Compliance monitoring and legal review"
        
      - risk: "Platform policy changes affecting multiplayer"
        mitigation: "Multi-platform strategy and adaptability"

# 使用指南
usage_notes: |
  这个多人游戏工作流程专门用于：
  1. 创建稳定可扩展的多人游戏GDD
  2. 建立公平竞争和积极社区环境
  3. 设计强大的网络架构和反作弊系统
  4. 实施有效的运营和内容更新策略
  5. 支持长期的社区建设和电竞发展

# BMAD集成
bmad_integration:
  multiplayer_handoff_requirements:
    - "可扩展的服务器架构和网络系统"
    - "实时同步和延迟优化技术"
    - "反作弊和安全系统实现"
    - "跨平台兼容性和通信协议"
    - "社区管理工具和数据分析系统"
  
  genre_optimization:
    - "高性能网络编程和优化"
    - "负载均衡和服务器集群管理"
    - "实时数据分析和监控系统"
    - "社交功能和用户生成内容支持"